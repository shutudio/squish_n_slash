<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Squish &amp; Slash</title>
<meta name="theme-color" content="#171232">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  .hidden { display:none !important; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#171232;
    font-family:'Segoe UI', system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif;
    touch-action:none; overscroll-behavior:none;
    user-select:none; -webkit-user-select:none;
  }
  #game { position:fixed; inset:0; display:block; }

  /* ---------- HUD ---------- */
  #hud {
    position:fixed; top:0; left:0; right:0;
    padding:max(12px, env(safe-area-inset-top)) 16px 0;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:5; color:#fff;
  }
  #scoreEl {
    font-size:clamp(26px, 6vw, 40px); font-weight:800;
    text-shadow:0 2px 8px rgba(0,0,0,.5);
    font-variant-numeric:tabular-nums;
  }
  #fpsEl { font-size:11px; opacity:.45; font-weight:600; }
  #rightHud { display:flex; align-items:center; gap:12px; }
  #heartsEl { font-size:clamp(22px, 5vw, 32px); letter-spacing:2px; text-shadow:0 2px 6px rgba(0,0,0,.5); }
  #heartsEl .lost { opacity:.22; filter:grayscale(1); }
  #muteBtn, #setBtn {
    pointer-events:auto; background:rgba(255,255,255,.12); border:none;
    border-radius:50%; width:42px; height:42px; font-size:20px; cursor:pointer;
    color:#fff; backdrop-filter:blur(4px);
  }

  /* ---------- 튜토리얼 ---------- */
  #tutBar {
    position:fixed; top:calc(env(safe-area-inset-top) + 70px); left:50%;
    transform:translateX(-50%); z-index:6; max-width:92vw;
    background:rgba(20,14,45,.85); color:#fff; padding:10px 16px; border-radius:16px;
    display:flex; gap:12px; align-items:center; font-size:15px; font-weight:600;
    backdrop-filter:blur(4px); box-shadow:0 4px 16px rgba(0,0,0,.35);
  }
  #tutBar.hidden { display:none; }
  #tutSkip {
    background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:999px;
    padding:6px 14px; font-size:13px; cursor:pointer; flex-shrink:0;
  }
  #tutHint {
    position:fixed; left:50%; top:52%; z-index:6; font-size:46px;
    pointer-events:none; display:none;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,.5));
    animation:swipe 1.4s ease-in-out infinite;
  }
  @keyframes swipe {
    0% { transform:translate(-90px, 70px) rotate(-18deg); opacity:0; }
    15% { opacity:1; }
    70% { transform:translate(70px, -70px) rotate(8deg); opacity:1; }
    100% { transform:translate(95px, -95px) rotate(8deg); opacity:0; }
  }

  /* ---------- 가챠 / 도감 ---------- */
  .metaRow { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:94vw; }
  .metaRow .btn {
    padding:12px 18px; font-size:clamp(14px, 3.6vw, 17px);
    white-space:nowrap; flex-shrink:0;
  }
  .coinBar { font-size:17px; font-weight:700; color:#ffd54d; }
  #collGrid {
    display:grid; grid-template-columns:repeat(4, minmax(68px, 80px)); gap:10px;
    max-height:48vh; overflow-y:auto; padding:4px;
  }
  .card {
    background:rgba(255,255,255,.08); border-radius:12px; padding:7px 4px 5px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    cursor:pointer; border:2px solid transparent;
  }
  .card.eq { border-color:#ffd54d; background:rgba(255,213,77,.12); }
  .card canvas { width:52px; height:52px; }
  .card .nm { font-size:10px; font-weight:700; line-height:1.2; text-align:center; }
  .card.lock { opacity:.5; }
  #collRate { font-size:14px; opacity:.8; }
  .collHint { font-size:12px; opacity:.55; }
  #gachaBox { font-size:84px; filter:drop-shadow(0 6px 16px rgba(0,0,0,.4)); }
  #gachaBox.shake { animation:gshake .12s linear infinite; }
  @keyframes gshake { 0%{transform:rotate(-9deg) scale(1.02)} 50%{transform:rotate(9deg) scale(1.06)} 100%{transform:rotate(-9deg) scale(1.02)} }
  #gachaResult { display:none; flex-direction:column; align-items:center; gap:4px; }
  #gachaCv { width:140px; height:140px; }
  #gachaName { font-size:20px; font-weight:800; }
  #gachaRar { font-size:15px; font-weight:700; }
  #gachaMsg { font-size:14px; color:#ff8a9a; min-height:18px; }
  #gachaMulti { display:none; grid-template-columns:repeat(5, minmax(54px, 64px)); gap:8px; }
  .gcard { display:flex; flex-direction:column; align-items:center; gap:1px; font-size:10px; font-weight:700; opacity:0; transform:scale(.5); transition:all .25s; }
  .gcard.show { opacity:1; transform:scale(1); }
  .gcard canvas { width:48px; height:48px; }
  #dailyBar { font-size:14px; color:#8df57a; font-weight:700; }
  #achList { display:flex; flex-direction:column; gap:8px; max-height:52vh; overflow-y:auto; width:min(92vw, 420px); }
  .ach { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.07); padding:10px 14px; border-radius:12px; text-align:left; }
  .ach .ainfo { flex:1; min-width:0; }
  .ach .anm { font-size:14px; font-weight:800; }
  .ach .adesc { font-size:11px; opacity:.7; }
  .ach .aprog { font-size:11px; color:#9fd6ff; font-weight:700; }
  .achBtn {
    background:linear-gradient(180deg,#ffe98a,#ffc933); color:#241a4d; border:none;
    border-radius:999px; padding:8px 14px; font-weight:800; cursor:pointer; font-size:13px;
    white-space:nowrap; flex-shrink:0;
  }
  .achBtn[disabled] { background:rgba(255,255,255,.15); color:#9a94b8; }

  /* ---------- Overlays ---------- */
  .overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#fff; gap:14px; padding:24px;
    background:radial-gradient(ellipse at 50% 35%, rgba(70,50,140,.55), rgba(15,10,35,.92) 75%);
    backdrop-filter:blur(3px);
  }
  .overlay.hidden { display:none; }
  .title {
    font-size:clamp(40px, 11vw, 72px); font-weight:900; line-height:1.05;
    background:linear-gradient(135deg, #8df57a 15%, #ffd84d 55%, #8fd9ff 90%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.45));
  }
  .subtitle { font-size:clamp(14px, 3.6vw, 18px); opacity:.85; }
  .legend {
    display:flex; flex-direction:column; gap:8px; margin:10px 0;
    font-size:clamp(14px, 3.6vw, 17px);
    background:rgba(255,255,255,.07); padding:16px 22px; border-radius:16px;
  }
  .legend div { display:flex; align-items:center; gap:10px; }
  .legend .pt { margin-left:auto; font-weight:700; padding-left:18px; }
  .good { color:#9bf08b; } .bonus { color:#ffd84d; } .bad { color:#9fd8ff; }
  .btn {
    font-size:clamp(18px, 4.6vw, 24px); font-weight:800; color:#241a4d;
    background:linear-gradient(180deg, #ffe98a, #ffc933);
    border:none; border-radius:999px; padding:16px 52px; cursor:pointer;
    box-shadow:0 6px 0 #c98f12, 0 10px 24px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn:active { transform:translateY(4px); box-shadow:0 2px 0 #c98f12; }
  .btn.ghost {
    background:rgba(255,255,255,.12); color:#fff; box-shadow:none;
    font-size:clamp(15px, 3.8vw, 18px); padding:12px 36px;
  }
  .stats { display:flex; flex-direction:column; gap:6px; margin:6px 0 10px; }
  .stats .big { font-size:clamp(48px, 13vw, 84px); font-weight:900; color:#ffd84d; text-shadow:0 4px 16px rgba(0,0,0,.5); font-variant-numeric:tabular-nums; }
  .stats .row { font-size:clamp(15px, 4vw, 19px); opacity:.9; }
  .newBest { color:#8df57a; font-weight:800; animation:pulse 1s infinite; }
  @keyframes pulse { 50% { transform:scale(1.08); } }
  #overTitle, .ovTitle { font-size:clamp(30px, 8vw, 48px); font-weight:900; }
  .hint { font-size:13px; opacity:.55; margin-top:6px; }
</style>

<body>
<canvas id="game"></canvas>

<div id="hud">

  </div>
  <div id="rightHud">

</div>

<div id="tutBar" class="hidden">
  <span id="tutText"></span>

</div>

<div id="setScreen" class="overlay hidden">
  <div class="ovTitle">설정</div>
  <button class="btn ghost" id="setSound">🔊 소리: 켜짐</button>
  <button class="btn ghost" id="setTut">📖 튜토리얼 다시 보기</button>

    <div><span>✨</span><span class="bonus">황금 슬랑이</span><span>— 레어!</span><span class="pt bonus">+50</span></div>

<div id="collScreen" class="overlay hidden">

  </div>

<script>
'use strict';
/* ================= 기본 셋업 ================= */
const cv = document.getElementById('game');
let ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);  // 픽셀 수를 줄여 프레임 확보
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
}
window.addEventListener('resize', resize); resize();

const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const GRAV = () => H * 1.35;

const $ = id => document.getElementById(id);
const scoreEl = $('scoreEl'), heartsEl = $('heartsEl'), fpsEl = $('fpsEl');

function safeGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function safeSet(k, v){ try { localStorage.setItem(k, v); } catch(e){} }

/* ================= 사운드 (Web Audio 합성 / ASMR) ================= */
let AC = null, master = null, muted = false, noiseBuffer = null;
function initAudio(){
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = muted ? 0 : 0.8;
  const comp = AC.createDynamicsCompressor();   // 레이어 겹침 시 클리핑 방지
  comp.threshold.value = -14; comp.knee.value = 20; comp.ratio.value = 6;
  comp.attack.value = 0.002; comp.release.value = 0.12;
  master.connect(comp); comp.connect(AC.destination);
  noiseBuffer = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  loadSamples();
}
/* ---------- 실제 사운드 샘플 (sounds/ 폴더에 파일이 있으면 합성음 대신 사용) ----------
   파일명 규칙: sounds/slangi_1.mp3 ~ slangi_4.mp3, wak_1.mp3 ~, ice_1.mp3 ~ (1개 이상, 최대 4개) */
const SAMPLES = { slangi: [], wak: [], ice: [] };
let samplesRequested = false;
function loadSamples(){
  if (samplesRequested) return; samplesRequested = true;
  for (const type of Object.keys(SAMPLES)){
    for (let i = 1; i <= 4; i++){
      fetch('sounds/' + type + '_' + i + '.mp3')
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(b => AC.decodeAudioData(b))
        .then(buf => SAMPLES[type].push(buf))
        .catch(() => {});
    }
  }
}
const SAMPLE_VOL = { slangi: 0.9, wak: 0.5, ice: 0.85 };  // 종류별 볼륨 (왁뿌볼은 녹음이 커서 낮춤)
function playSample(type, pitch){
  const arr = SAMPLES[type];
  if (!AC || !arr.length) return false;
  const s = AC.createBufferSource();
  s.buffer = arr[(Math.random() * arr.length) | 0];
  s.playbackRate.value = pitch * rand(0.96, 1.05);  // 콤보 피치 + 랜덤 변형
  const g = AC.createGain(); g.gain.value = SAMPLE_VOL[type] || 0.9;
  s.connect(g); g.connect(master);
  s.start();
  return true;
}
function env(g, t, atk, peak, dec){
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t + atk + dec);
}
function noiseHit(t, type, f0, f1, q, peak, dur, atk){
  const s = AC.createBufferSource(); s.buffer = noiseBuffer;
  const f = AC.createBiquadFilter(); f.type = type; f.Q.value = q;
  f.frequency.setValueAtTime(f0, t);
  f.frequency.exponentialRampToValueAtTime(Math.max(f1, 30), t + dur);
  const g = AC.createGain(); env(g, t, atk || 0.004, peak, dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t); s.stop(t + dur + 0.1);
}
function tone(t, type, f0, f1, peak, atk, dur){
  const o = AC.createOscillator(); o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1, 20), t + dur);
  const g = AC.createGain(); env(g, t, atk, peak, dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + atk + dur + 0.1);
}
/* 쫀득한 마이크로 팝 — 끈적한 기포가 늘어났다 터지는 질감 */
function stickyPops(t, p, n, vol){
  let tc = 0.012;
  for (let i = 0; i < n; i++){
    const f = rand(320, 850) * p;
    noiseHit(t + tc, 'bandpass', f, f * 0.45, 13, vol * rand(0.6, 1), rand(0.02, 0.05));
    // 팝마다 살짝 위로 휘는 점성 챠프 (쪼-옥 늘어나는 느낌)
    if (Math.random() < 0.6)
      tone(t + tc, 'sine', rand(110, 200) * p, rand(280, 460) * p, vol * 0.35, 0.008, rand(0.04, 0.08));
    tc += rand(0.022, 0.05);
  }
}
/* 슬랑이 — 꾸덕하고 쫀득한 슬라임 */
function playSquish(p){
  if (!AC) return;
  if (playSample('slangi', p)) return;
  const t = AC.currentTime, v = rand(0.92, 1.08);
  // 찰방~ 쫀득~ : 퍽(저음 타격) 제거, 부드럽게 출렁이는 물기 + 길게 늘어나는 점성
  // 1) 찰방 — 어택을 느리게, 물이 차오르듯 부드러운 스플래시
  noiseHit(t, 'lowpass', 2800 * p * v, 480, 1.4, 0.34, 0.3, 0.04);
  // 2) 잔물결 — 두 번째 찰방 (작고 늦게)
  noiseHit(t + rand(0.1, 0.15), 'lowpass', rand(1500, 2200) * p, 400, 1.4, 0.2, 0.22, 0.03);
  // 3) 톡톡 튀는 물방울 반짝임
  for (let i = 0; i < 5; i++)
    noiseHit(t + rand(0.03, 0.24), 'lowpass', rand(1900, 3600), 900, 1, rand(0.04, 0.09), rand(0.02, 0.035));
  // 4) 쫀득 — 음정이 쭈우욱 늘어났다가 말랑하게 놓이는 점성 스트레치
  const o = AC.createOscillator(); o.type = 'sine';
  const f0 = 150 * p * v;
  o.frequency.setValueAtTime(f0, t + 0.03);
  o.frequency.exponentialRampToValueAtTime(f0 * 2.4, t + 0.16);
  o.frequency.exponentialRampToValueAtTime(f0 * 0.6, t + 0.34);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t + 0.03);
  g.gain.linearRampToValueAtTime(0.16, t + 0.12);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.36);
  o.connect(g); g.connect(master); o.start(t + 0.03); o.stop(t + 0.42);
}
/* 왁뿌볼 크랙 직후 따라붙는 끈적한 점액 꼬리 (gooey suction) */
function thudTail(p){
  const t = AC.currentTime + 0.16;   // 크랙이 먼저, 그 뒤 점액
  noiseHit(t, 'lowpass', 900 * p, 180, 2, 0.22, 0.2);
  noiseHit(t + 0.05, 'bandpass', rand(350, 550), 220, 1.6, 0.16, 0.12);
  const o = AC.createOscillator(); o.type = 'sine';
  const f0 = 130 * p;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f0 * 2.3, t + 0.08);
  o.frequency.exponentialRampToValueAtTime(f0 * 0.6, t + 0.2);
  const g = AC.createGain(); env(g, t, 0.02, 0.18, 0.2);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.3);
}
/* 왁스 껍질 크랙 그레인 — 작은 조각 하나가 "짝" 하고 갈라지는 공명 핑 */
function crackGrain(t, f, vol, pan){
  const o = AC.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(f, t);
  o.frequency.exponentialRampToValueAtTime(f * 0.7, t + 0.03);
  const g = AC.createGain(); env(g, t, 0.0015, vol, rand(0.018, 0.04));
  let out = master;
  if (AC.createStereoPanner){
    const pn = AC.createStereoPanner(); pn.pan.value = pan;
    pn.connect(master); out = pn;
  }
  o.connect(g); g.connect(out);
  o.start(t); o.stop(t + 0.09);
  // 미세한 껍질 부스러기 (절반 확률)
  if (Math.random() < 0.5){
    const s = AC.createBufferSource(); s.buffer = noiseBuffer;
    const fl = AC.createBiquadFilter(); fl.type = 'bandpass';
    fl.frequency.value = Math.min(f * 1.4, 6000); fl.Q.value = 2.5;
    const g2 = AC.createGain(); env(g2, t, 0.001, vol * 0.5, 0.012);
    s.connect(fl); fl.connect(g2); g2.connect(out);
    s.start(t); s.stop(t + 0.05);
  }
}
/* 왁뿌볼 — 자그작 빠지직 (실제 왁뿌볼 ASMR처럼 잘게 부서지는 크랙) + 쫀득함 */
function playThud(p){
  if (!AC) return;
  if (playSample('wak', p)){ thudTail(p); return; }   // 녹음 크랙 유지 + 점액 꼬리 추가
  const t = AC.currentTime, v = rand(0.94, 1.06);
  // 1) 손에 쥐어 깨지는 부드러운 임팩트 (과하지 않게)
  tone(t, 'sine', 135 * p * v, 42, 0.42, 0.004, 0.12);
  // 2) 자그작 빠지직 — 크랙 그레인 20여 개, 불규칙 간격, 점점 잦아듦
  const n = 18 + ((Math.random() * 9) | 0);
  let tc = 0;
  for (let i = 0; i < n; i++){
    const decay = Math.pow(1 - i / n, 0.65);              // 뒤로 갈수록 작고 성기게
    crackGrain(t + tc, rand(900, 3200) * p * v, rand(0.07, 0.26) * decay + 0.04, rand(-0.7, 0.7));
    tc += rand(0.004, 0.02) + (Math.random() < 0.25 ? rand(0.02, 0.045) : 0); // 불규칙 리듬
  }
  // 3) 크랙 사이로 배어나오는 속살의 쫀득함
  const ts = t + 0.08;
  tone(ts, 'sine', 170 * p * v, 55, 0.24, 0.01, 0.16);
  stickyPops(ts, p * v, 3, 0.2);
}
/* 얼음 — 차가운 "캉!" */
function playClang(){
  if (!AC) return;
  if (playSample('ice', 1)) return;
  const t = AC.currentTime, v = rand(0.97, 1.03);
  tone(t, 'triangle', 1780 * v, 1700 * v, 0.4, 0.002, 0.4);

  tone(t, 'square', 3550 * v, 3400 * v, 0.08, 0.002, 0.2);

}

function drawDeco(r, deco){
  if (deco === 'seeds'){
    ctx.fillStyle = 'rgba(190,50,70,0.55)';
    for (let i = 0; i < 7; i++){
      const a = i * 0.93 + 0.4, d = r * (0.38 + 0.32 * ((i * 37) % 10) / 10);
      ctx.save(); ctx.translate(Math.cos(a) * d, Math.sin(a) * d * 0.68); ctx.rotate(a);
      ctx.beginPath(); ctx.ellipse(0, 0, r * 0.032, r * 0.055, 0, 0, TAU); ctx.fill();
      ctx.restore();
    }
  } else if (deco === 'stripe'){
    ctx.strokeStyle = 'rgba(50,110,40,0.4)'; ctx.lineWidth = r * 0.09; ctx.lineCap = 'round';
    for (let i = -1; i <= 1; i++){
      ctx.beginPath(); ctx.moveTo(-r * 0.85, i * r * 0.42 - r * 0.05);
      ctx.quadraticCurveTo(0, i * r * 0.42 + r * 0.08, r * 0.85, i * r * 0.42 - r * 0.05);
      ctx.stroke();
    }
  } else if (deco === 'bubble'){
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let i = 0; i < 6; i++){
      const a = i * 1.13 + 0.7, d = r * (0.3 + 0.42 * ((i * 53) % 10) / 10);
      ctx.beginPath(); ctx.arc(Math.cos(a) * d, Math.sin(a) * d * 0.68, r * (0.045 + 0.03 * (i % 3)), 0, TAU); ctx.fill();
    }
  } else if (deco === 'chips'){
    ctx.fillStyle = 'rgba(60,35,18,0.8)';
    for (let i = 0; i < 6; i++){
      const a = i * 1.05 + 0.3, d = r * (0.35 + 0.38 * ((i * 71) % 10) / 10);
      ctx.beginPath(); ctx.arc(Math.cos(a) * d, Math.sin(a) * d * 0.68, r * 0.07, 0, TAU); ctx.fill();
    }
  } else if (deco === 'stars' || deco === 'hearts'){
    ctx.font = (r * 0.24) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = deco === 'stars' ? 'rgba(255,243,160,0.95)' : 'rgba(255,110,145,0.85)';
    const s = deco === 'stars' ? '★' : '♥';
    for (let i = 0; i < 5; i++){
      const a = i * 1.35 + 0.5, d = r * (0.35 + 0.35 * ((i * 41) % 10) / 10);
      ctx.fillText(s, Math.cos(a) * d, Math.sin(a) * d * 0.66);
    }
  } else if (deco === 'rainbow' || deco === 'aurora'){
    ctx.save();
    ctx.beginPath();
    if (deco === 'aurora') ctx.arc(0, 0, r * 0.97, 0, TAU);
    else ctx.ellipse(0, 0, r * 1.0, r * 0.8, 0, 0, TAU);
    ctx.clip();
    const cols = ['#ff9aa2', '#ffd97a', '#9be8a0', '#9fd6ff', '#d3a8ff'];
    ctx.globalAlpha = 0.45;
    cols.forEach((c, i) => {
      ctx.fillStyle = c;
      ctx.fillRect(-r * 1.1, -r * 0.7 + i * r * 0.28, r * 2.2, r * 0.28);
    });
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

/* ================= 슬라이스 ================= */
function segDist(a, b, o){
  const dx = b.x - a.x, dy = b.y - a.y;
  const l2 = dx * dx + dy * dy || 1;
  let t = ((o.x - a.x) * dx + (o.y - a.y) * dy) / l2;
  t = clamp(t, 0, 1);
  return Math.hypot(o.x - (a.x + dx * t), o.y - (a.y + dy * t));
}
function sliceSegment(a, b){
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  const targets = [];
  for (const o of objs){
    if (o.hit || o.dead) continue;
    if (segDist(a, b, o) < o.r * 0.95) targets.push(o);
  }
  for (const o of targets) sliceObj(o, ang, a);  // 멀티 새끼가 같은 획에 즉사하지 않게 스냅샷
}
function sliceObj(o, ang, a){
  o.hit = true;

  // 실제 그은 선이 오브젝트를 지나간 위치로 절단선 결정 (매번 다른 크기로 잘림)
  let cut = (a.x - o.x) * -Math.sin(ang) + (a.y - o.y) * Math.cos(ang);
  cut = clamp(cut, -o.r * 0.65, o.r * 0.65);
  o.dead = true;
  let base = o.gold ? 50 : o.mini ? 5 : o.type === 'wak' ? 20 : 10;
  if (fever > 0) base *= 2;   // 피버타임 2배

  if (o.rar >= 3 && !o.mini && state === ST.PLAY){
    const bn = o.rar === 4 ? 30 : 15;

    pops.push({ x: o.x, y: o.y - o.r * 1.9, text: (o.rar === 4 ? '🌈 전설 +' : '✨ 에픽 +') + bn,

      ? ['#ff9aa2', '#ffd97a', '#9be8a0', '#9fd6ff', '#d3a8ff']
      : ['#fff3a8', '#d3a8ff', '#ffffff'], 14, o.r);
    if (o.rar === 4) whiteFlash = Math.max(whiteFlash, 0.3);
  }
  strokeN++; strokeBase += base; score += base;
  lastSliceT = performance.now();

  // 두 조각 분리 — 점도 있는 슬라임처럼 묵직하게 벌어지고, 단면은 울퉁불퉁
  const nx = Math.sin(ang), ny = -Math.cos(ang);
  const wob = []; for (let i = 0; i <= 6; i++) wob.push(rand(-1, 1));
  const pair = [];
  for (const side of [-1, 1]){
    const imp = rand(55, 110);   // 과일처럼 튕기지 않게 느린 분리

      side, life: 1.4, age: 0, phase: o.phase, pal: o.pal, seed: o.seed, spr: o.spr, wob, cut
    };

  // 갈라질 때 잠깐 끈적하게 이어지는 가닥 (슬랑이)
  if (o.type === 'slangi') strands.push({ a: pair[0], b: pair[1], t: 0.26, w: o.r * 0.5, color: o.pal.main });
  burst(o.x, o.y, partColors(o.type, o.pal), o.type === 'wak' ? 14 : 10, o.r);
  // 끈적하게 흘러내리는 방울
  const nd = o.type === 'slangi' ? 4 : 2;
  for (let i = 0; i < nd; i++)
    parts.push({ drip: true, x: o.x + rand(-o.r, o.r) * 0.5, y: o.y + rand(0, o.r * 0.3),
      vx: rand(-18, 18), vy: rand(10, 50), r: rand(3.5, 6.5),
      color: o.type === 'wak' ? (Math.random() < 0.5 ? o.pal.a : o.pal.b) : o.pal.main,
      life: rand(0.7, 1.1), maxLife: 1.1 });
  pops.push({ x: o.x, y: o.y - o.r, text: (o.gold ? '✨+' : '+') + base,
    color: o.gold ? '#ffd84d' : '#ffffff', life: o.gold ? 1.1 : 0.8, size: o.gold ? 30 : 22, vy: -90 });
  if (o.gold){ whiteFlash = Math.max(whiteFlash, 0.25); burst(o.x, o.y, ['#fff3a8', '#ffd54d', '#ffffff'], 10, o.r); }
  if (o.multi){   // 멀티 슬랑이 — 새끼 슬랑이 3마리 연쇄!

function hitIce(o){

}
function finishStroke(){
  if (strokeN >= 2){
    const mult = strokeN === 2 ? 1.2 : strokeN === 3 ? 1.5 : 2.0;
    const bonus = Math.round(strokeBase * (mult - 1));
    score += bonus;
    maxCombo = Math.max(maxCombo, strokeN);
    let mx = 0, my = 0;
    for (const p of strokePts){ mx += p.x; my += p.y; }
    mx /= strokePts.length; my /= strokePts.length;
    pops.push({ x: clamp(mx, W * 0.2, W * 0.8), y: clamp(my, H * 0.25, H * 0.7),
      text: strokeN + ' 콤보! ×' + mult + ' +' + bonus, color: '#ffd84d', life: 1.2, size: 32, vy: -50 });
    playCombo(strokeN); whiteFlash = Math.max(whiteFlash, 0.3);
    buzz([20, 40, 25]);
    if (strokeN >= 4 && state === ST.PLAY && fever <= 0){   // 4콤보 → 피버! (피버 중 연장 없음)
      fever = 4;

      pops.push({ x: W / 2, y: H * 0.35, text: '🔥 FEVER TIME!', color: '#ffd84d', life: 1.4, size: 40, vy: -30 });
      whiteFlash = 0.5;
    }
  } else if (strokeN === 1){
    maxCombo = Math.max(maxCombo, 1);
  }
  strokeN = 0; strokeBase = 0; strokePts = [];
}
function missObj(o){

}
function checkDeath(){

let tutStep = 0, tutCount = 0, tutDelay = 0;
const TUT = [
  { text: '🟢 슬랑이를 드래그로 잘라보세요!', type: 'slangi', n: 1, need: 1 },
  { text: '🟡 왁뿌볼은 부수면 +20점!', type: 'wak', n: 1, need: 1 },
  { text: '✨ 한 번에 여러 개 자르면 콤보!', type: 'slangi', n: 3, need: 3 },
  { text: '🧊 얼음은 자르면 안 돼요! 그냥 보내세요', type: 'ice', n: 1, need: 0 },
  { text: '준비 완료! 진짜 게임 시작 🎉', type: null, n: 0, need: -1 }

function startTutorial(){
  initAudio(); resetGame();
  $('startScreen').classList.add('hidden');
  $('overScreen').classList.add('hidden');
  $('setScreen').classList.add('hidden');
  paused = false;
  state = ST.TUT; tutStep = -1; tutDelay = 0;
  $('tutBar').classList.remove('hidden');
  tutAdvance();
  syncHUD();
}
function tutAdvance(){
  tutStep++; tutCount = 0;
  if (tutStep >= TUT.length){ endTutorial(); return; }
  const s = TUT[tutStep];
  $('tutText').textContent = s.text;
  $('tutHint').style.display = tutStep === 0 ? 'block' : 'none';
  if (s.need === -1) tutDelay = 1.5;
  else tutSpawn();
}
function tutSpawn(){
  const s = TUT[tutStep];
  for (let i = 0; i < s.n; i++){
    const R = clamp(Math.min(W, H) / 700, 0.75, 1.3) * 42;
    const x = W * (s.n === 1 ? 0.5 : 0.28 + 0.44 * i / (s.n - 1));
    const pal = palFor(s.type), seed = rand(0, TAU);
    objs.push({ type: s.type, x, y: H + R + 10, gold: false, multi: false,
      vx: 0, vy: -Math.sqrt(2 * GRAV() * H * 0.62),
      r: R, rot: rand(0, TAU), vrot: rand(-1.5, 1.5), phase: rand(0, TAU),
      hit: false, dead: false, iceFlash: 0, pal, seed, spr: makeSprite(s.type, R, pal, seed) });
  }
}
function endTutorial(){
  safeSet('sns_tut_done', '1');
  $('tutBar').classList.add('hidden');
  $('tutHint').style.display = 'none';
  startGame();
}
function updateTut(dt){
  const g = GRAV();
  for (const o of objs){
    o.vy += g * dt; o.x += o.vx * dt; o.y += o.vy * dt;
    o.rot += o.vrot * dt; o.phase += dt * 7;
    if (o.iceFlash > 0) o.iceFlash -= dt;
    if (!o.dead && o.vy > 0 && o.y > H + o.r + 30){
      o.dead = true;
      const s = TUT[tutStep];
      if (s.need === 0 && o.type === 'ice' && !o.hit){ tutAdvance(); return; }  // 얼음 잘 보냄!
      if (!o.hit) tutDelay = Math.max(tutDelay, 0.5);   // 놓침 → 다시 던져줌
    }
  }
  objs = objs.filter(o => !o.dead);
  if (tutDelay > 0){
    tutDelay -= dt;
    if (tutDelay <= 0){
      const s = TUT[tutStep];
      if (s.need === -1) endTutorial();
      else if (s.need > 0 && tutCount >= s.need) tutAdvance();
      else if (objs.length === 0) tutSpawn();
      else tutDelay = 0.3;
    }
  }
}

function burst(x, y, colors, n, r){
  for (let i = 0; i < n; i++){

    parts.push({
      x: x + rand(-r, r) * 0.4, y: y + rand(-r, r) * 0.4,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - rand(40, 160),
      r: rand(3, 8), color: colors[(Math.random() * colors.length) | 0],
      life: rand(0.5, 0.95), maxLife: 1
    });

}

function getPos(e){ return { x: e.clientX, y: e.clientY }; }
document.addEventListener('pointerdown', e => {
  initAudio();
  if ((state !== ST.PLAY && state !== ST.TUT) || paused) return;
  pdown = true; lastP = getPos(e);
  trail.length = 0; trail.push({ x: lastP.x, y: lastP.y, t: performance.now() });
  strokeN = 0; strokeBase = 0; strokePts = [];
});
document.addEventListener('pointermove', e => {
  if (!pdown || (state !== ST.PLAY && state !== ST.TUT) || paused) return;
  const p = getPos(e);
  if (Math.hypot(p.x - lastP.x, p.y - lastP.y) < 3) return;
  trail.push({ x: p.x, y: p.y, t: performance.now() });
  if (trail.length > 40) trail.shift();
  sliceSegment(lastP, p);
  lastP = p;
});
function ptrUp(){
  if (!pdown) return;
  pdown = false;
  if (state === ST.PLAY || state === ST.TUT) finishStroke();
}
document.addEventListener('pointerup', ptrUp);

/* ================= 업데이트 ================= */
function update(dt){
  elapsed += dt; spawnT -= dt;
  // 드래그를 유지해도 0.45초간 추가 슬라이스가 없으면 콤보 정산
  if (pdown && strokeN > 0 && performance.now() - lastSliceT > 450) finishStroke();
  fever = Math.max(0, fever - dt);
  if (mode === 'time' && !overPending){
    timeLeft -= dt;
    if (timeLeft <= 0){ timeLeft = 0; overPending = true; overDelay = 0.5; }
  }
  if (spawnT <= 0 && !overPending){
    spawnWave();
    spawnT = Math.max(0.85, 1.7 - elapsed * 0.012) * rand(0.8, 1.2) * (fever > 0 ? 0.4 : 1);
  }
  const g = GRAV();
  for (const o of objs){
    o.vy += g * dt; o.x += o.vx * dt; o.y += o.vy * dt;
    o.rot += o.vrot * dt; o.phase += dt * 7;
    if (o.iceFlash > 0) o.iceFlash -= dt;
    if ((o.x < o.r && o.vx < 0) || (o.x > W - o.r && o.vx > 0)) o.vx *= -1;
    if (!o.dead && o.vy > 0 && o.y > H + o.r + 30){
      o.dead = true;
      if (o.type !== 'ice' && !o.hit && !o.mini && !overPending && fever <= 0) missObj(o);  // 새끼·피버 중엔 무벌점
    }
  }
  objs = objs.filter(o => !o.dead);
  if (overPending){
    overDelay -= dt;
    if (overDelay <= 0) gameOver();
  }
}
function updateFx(dt){
  const g = GRAV();
  for (const p of pieces){
    p.vy += g * 0.8 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.exp(-1.6 * dt); p.vrot *= Math.exp(-1.2 * dt);  // 점성 감쇠
    p.rot += p.vrot * dt; p.life -= dt; p.age += dt;
  }
  pieces = pieces.filter(p => p.life > 0 && p.y < H + 200);
  shake = Math.max(0, shake - 70 * dt);
  redFlash = Math.max(0, redFlash - 2.2 * dt);
  whiteFlash = Math.max(0, whiteFlash - 2.5 * dt);
  for (const p of parts){
    p.vy += GRAV() * (p.drip ? 0.3 : 0.7) * dt;   // 방울은 점성 있게 천천히
    if (p.drip) p.vx *= Math.exp(-3 * dt);
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
  }
  parts = parts.filter(p => p.life > 0);
  for (const s of strands) s.t -= dt;
  strands = strands.filter(s => s.t > 0);
  for (const p of pops){ p.y += p.vy * dt; p.life -= dt; }
  pops = pops.filter(p => p.life > 0);
  const now = performance.now();
  while (trail.length && now - trail[0].t > 130) trail.shift();
}

/* ================= 그리기 ================= */
let bgGrad = null, bgKey = '';
function drawBG(){
  const key = W + 'x' + H;
  if (key !== bgKey){
    bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#241b4d');
    bgGrad.addColorStop(0.6, '#171232');
    bgGrad.addColorStop(1, '#0e0a22');
    bgKey = key;
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  // 은은한 바닥 글로우
  ctx.fillStyle = 'rgba(120, 90, 220, 0.07)';
  ctx.beginPath(); ctx.ellipse(W / 2, H + 40, W * 0.7, 120, 0, 0, TAU); ctx.fill();
}
function drawShape(type, r, phase, pal, seed){
  const c = COLORS.ice;
  if (type === 'ice'){
    const s = r * 0.92;
    const grd = ctx.createLinearGradient(-s, -s, s, s);
    grd.addColorStop(0, 'rgba(240,251,255,0.95)');
    grd.addColorStop(0.5, 'rgba(168,219,250,0.9)');
    grd.addColorStop(1, 'rgba(111,182,232,0.95)');
    ctx.fillStyle = grd;
    roundRect(-s, -s, s * 2, s * 2, r * 0.25); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 3;
    roundRect(-s, -s, s * 2, s * 2, r * 0.25); ctx.stroke();
    // 성에 반짝임
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-s * 0.45, -s * 0.1); ctx.lineTo(-s * 0.1, -s * 0.45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.45, s * 0.35); ctx.lineTo(s * 0.35, -s * 0.45); ctx.stroke();
    return;
  }
  // 말랑 블롭 (슬랑이 / 왁뿌볼)
  const wob = 0.06 * Math.sin(phase);
  const sd = seed || 0;
  const wave = x => r * 0.08 * Math.sin(sd + x / r * 2.6) + r * 0.05 * Math.sin(sd * 1.7 + x / r * 5);
  ctx.save();
  ctx.scale(1 + wob, 1 - wob);
  if (type === 'wak'){
    // 파스텔 투톤 왁뿌볼 (매끈한 왁스 코팅)
    ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU);
    ctx.fillStyle = pal.b; ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.995, 0, TAU); ctx.clip();
    ctx.fillStyle = pal.a;                       // 위쪽 톤 (물결 경계)
    ctx.beginPath(); ctx.moveTo(-r, -r * 1.1);
    ctx.lineTo(-r, wave(-r));
    for (let i = 1; i <= 6; i++){ const x = -r + (2 * r) * i / 6; ctx.lineTo(x, wave(x)); }
    ctx.lineTo(r, -r * 1.1); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(120,90,160,0.10)';     // 아래쪽 은은한 음영
    ctx.beginPath(); ctx.arc(0, r * 0.55, r * 0.85, 0, TAU); ctx.fill();
    ctx.restore();
    // 왁스 광택
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath(); ctx.ellipse(-r * 0.32, -r * 0.42, r * 0.3, r * 0.16, -0.6, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.arc(-r * 0.18, -r * 0.55, r * 0.06, 0, TAU); ctx.fill();
  } else {
    // 파스텔 말랑이 슬랑이 — 빵/버터블록처럼 네모지고 푹신한 블롭
    const bl = 1 + 0.07 * Math.sin(phase);          // 말랑하게 숨쉬는 배불뚝이 변
    const w2 = r * 1.02, h2 = r * 0.8, k = r * 0.3;
    ctx.beginPath();
    ctx.moveTo(-w2 + k, -h2);
    ctx.quadraticCurveTo(0, -h2 - r * 0.14 * bl, w2 - k, -h2);
    ctx.quadraticCurveTo(w2, -h2, w2, -h2 + k);
    ctx.quadraticCurveTo(w2 + r * 0.1 * bl, 0, w2, h2 - k);
    ctx.quadraticCurveTo(w2, h2, w2 - k, h2);
    ctx.quadraticCurveTo(0, h2 + r * 0.14 * bl, -w2 + k, h2);
    ctx.quadraticCurveTo(-w2, h2, -w2, h2 - k);
    ctx.quadraticCurveTo(-w2 - r * 0.1 * bl, 0, -w2, -h2 + k);
    ctx.quadraticCurveTo(-w2, -h2, -w2 + k, -h2);
    ctx.closePath();
    const grd = ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.15, 0, 0, r * 1.15);
    grd.addColorStop(0, pal.light);
    grd.addColorStop(0.55, pal.main);
    grd.addColorStop(1, pal.dark);
    ctx.fillStyle = grd;
    ctx.fill();
    // 치즈 구멍 — 오목하게 파인 동그란 홈 (얼굴 피해서 가장자리 쪽)
    for (let i = 0; i < 5; i++){
      const a = sd * 2.3 + i * (TAU / 5) + Math.sin(sd + i) * 0.4;
      const dist = r * (0.62 + 0.12 * Math.sin(sd * 1.3 + i * 2.1));
      const px = Math.cos(a) * dist, py = Math.sin(a) * dist * 0.72;
      const hr = r * (0.08 + 0.06 * Math.abs(Math.sin(sd + i * 1.7)));
      const hg = ctx.createRadialGradient(px - hr * 0.3, py - hr * 0.3, hr * 0.1, px, py, hr);
      hg.addColorStop(0, 'rgba(120,90,40,0.30)');
      hg.addColorStop(0.7, 'rgba(140,105,55,0.16)');
      hg.addColorStop(1, 'rgba(255,255,255,0.30)');   // 테두리 빛으로 오목한 입체감
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(px, py, hr, 0, TAU); ctx.fill();
    }
    // 파스텔 스프링클
    const SPRK = ['#ffb3c7', '#a8d8ff', '#b9f2c4', '#ffd97a', '#e7c8ff'];
    for (let i = 0; i < 7; i++){
      const px = rand(-0.75, 0.75) * r, py = rand(-0.65, 0.65) * r * 0.8;
      if (Math.abs(px) < r * 0.45 && py > -r * 0.3 && py < r * 0.32) continue;  // 얼굴 자리 비움
      ctx.save(); ctx.translate(px, py); ctx.rotate(rand(0, TAU));
      ctx.fillStyle = SPRK[(Math.random() * SPRK.length) | 0];
      ctx.fillRect(-r * 0.05, -r * 0.016, r * 0.1, r * 0.032);
      ctx.restore();
    }
    // 말랑한 광택
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(-r * 0.38, -r * 0.45, r * 0.28, r * 0.12, -0.45, 0, TAU); ctx.fill();
  }
  ctx.restore();
}
function drawFace(r, type){
  // 윤기 도는 까만 눈 (하이라이트 두 개)
  ctx.fillStyle = '#3a2620';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.05, r * 0.135, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.05, r * 0.135, 0, TAU); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(-r * 0.345, -r * 0.1, r * 0.05, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.255, -r * 0.1, r * 0.05, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-r * 0.26, -r * 0.01, r * 0.025, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.34, -r * 0.01, r * 0.025, 0, TAU); ctx.fill();
  // 수줍은 미소
  ctx.strokeStyle = '#3a2620'; ctx.lineWidth = Math.max(2, r * 0.06); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, r * 0.13, r * 0.16, 0.3, Math.PI - 0.3); ctx.stroke();
}
function roundRect(x, y, w, h, rr){
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}
/* 스프라이트 캐시 — 등장 시 한 번만 그려두고 매 프레임 이미지로 찍음 (프레임 최적화) */
const SPR_PAD = 1.4;
function makeSprite(type, r, pal, seed, multi, deco){
  const half = r * SPR_PAD;
  const res = Math.min(window.devicePixelRatio || 1, 2);
  const c = document.createElement('canvas');
  c.width = c.height = Math.max(4, Math.ceil(half * 2 * res));
  const sc = c.getContext('2d');
  const old = ctx; ctx = sc;
  ctx.setTransform(res, 0, 0, res, half * res, half * res);
  drawShape(type, r, 0, pal, seed);
  if (deco) drawDeco(r, deco);   // 캐릭터 무늬
  if (multi){   // 멀티 슬랑이 — 물방울 무늬
    const MC = ['#ff8fb3', '#7cc4ff', '#8fe3a0', '#ffd455', '#c79bff'];
    for (let i = 0; i < 6; i++){
      const a = seed * 4.1 + i * 1.05, d = r * (0.45 + 0.3 * Math.abs(Math.sin(seed + i * 2.3)));
      const px = Math.cos(a) * d, py = Math.sin(a) * d * 0.7;
      if (Math.abs(px) < r * 0.45 && Math.abs(py) < r * 0.3) continue;
      ctx.fillStyle = MC[i % MC.length];
      ctx.beginPath(); ctx.arc(px, py, r * 0.1, 0, TAU); ctx.fill();
    }
  }
  if (type === 'slangi') drawFace(r, 'slangi');
  ctx = old;
  return { c, half };
}
function drawObj(o){
  ctx.save();
  ctx.translate(o.x, o.y);
  // 스쿼시 & 스트레치 (속도 방향으로 늘어남)
  const sp = Math.hypot(o.vx, o.vy);
  const st = clamp(sp / 2400, 0, 0.26);
  const va = Math.atan2(o.vy, o.vx);
  ctx.rotate(va); ctx.scale(1 + st, 1 - st * 0.75); ctx.rotate(-va);
  if (o.type === 'ice'){
    ctx.rotate(o.rot * 0.5);
    ctx.drawImage(o.spr.c, -o.spr.half, -o.spr.half, o.spr.half * 2, o.spr.half * 2);
    if (o.iceFlash > 0){
      ctx.fillStyle = 'rgba(255,255,255,' + (o.iceFlash * 1.8) + ')';
      ctx.beginPath(); ctx.arc(0, 0, o.r * 1.1, 0, TAU); ctx.fill();
    }
  } else if (o.type === 'wak'){
    ctx.rotate(o.rot * 0.6);
    const br = 0.04 * Math.sin(o.phase);
    ctx.scale(1 + br, 1 - br);
    ctx.drawImage(o.spr.c, -o.spr.half, -o.spr.half, o.spr.half * 2, o.spr.half * 2);
  } else {
    if (o.gold){   // 황금 슬랑이 후광 + 반짝임
      ctx.fillStyle = 'rgba(255,215,90,0.25)';
      ctx.beginPath(); ctx.arc(0, 0, o.r * 1.35 + Math.sin(o.phase * 2) * 3, 0, TAU); ctx.fill();
    }
    const br = 0.06 * Math.sin(o.phase);   // 말랑하게 숨쉬는 효과는 스케일로 (가벼움)
    ctx.scale(1 + br, 1 - br);
    ctx.drawImage(o.spr.c, -o.spr.half, -o.spr.half, o.spr.half * 2, o.spr.half * 2);
  }
  ctx.restore();
}
function drawPiece(p){
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  // 점도: 시간이 지나며 옆으로 퍼지고 처지는 슬라임 느낌
  const melt = clamp(p.age * 0.9, 0, 0.4);
  ctx.scale(1 + melt * 0.55, 1 - melt * 0.5);
  ctx.translate(0, p.side * melt * p.r * 0.25);
  ctx.globalAlpha = p.life < 0.45 ? p.life / 0.45 : 1;
  // 울퉁불퉁한 젤리 단면으로 클리핑 (두 조각이 서로 맞물리는 단면)
  const R = p.r * 1.8;
  const edgeY = i => p.cut + p.wob[i] * p.r * 0.14;
  ctx.beginPath();
  ctx.moveTo(-R, edgeY(0));
  for (let i = 1; i <= 6; i++) ctx.lineTo(-R + (2 * R) * i / 6, edgeY(i));
  ctx.lineTo(R, p.side * R); ctx.lineTo(-R, p.side * R);
  ctx.closePath(); ctx.clip();
  ctx.drawImage(p.spr.c, -p.spr.half, -p.spr.half, p.spr.half * 2, p.spr.half * 2);
  // 끈적한 속살 단면
  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = 4; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-p.r * 0.9, edgeY(1));
  for (let i = 2; i <= 5; i++) ctx.lineTo(-p.r * 0.9 + (1.8 * p.r) * (i - 1) / 4, edgeY(i));
  ctx.stroke();
  ctx.restore();
}
function drawStrands(){
  // 갈라진 두 조각 사이에 잠깐 늘어나는 끈적한 가닥
  ctx.lineCap = 'round';
  for (const s of strands){
    const k = s.t / 0.26;
    ctx.globalAlpha = k * 0.85;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = Math.max(1, s.w * k * k);
    ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.b.x, s.b.y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawTrail(){
  if (trail.length < 2) return;
  const now = performance.now();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (let pass = 0; pass < 2; pass++){
    for (let i = 1; i < trail.length; i++){
      const a = trail[i - 1], b = trail[i];
      const age = 1 - (now - b.t) / 130;
      if (age <= 0) continue;
      const frac = i / trail.length;
      ctx.strokeStyle = pass === 0
        ? 'rgba(140,210,255,' + (0.25 * age) + ')'
        : 'rgba(255,255,255,' + (0.85 * age) + ')';
      ctx.lineWidth = (pass === 0 ? 16 : 6) * frac * age + 1;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
  }
  ctx.restore();
}
function drawParticles(){
  for (const p of parts){
    ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    if (p.drip){
      const st = 1 + clamp(Math.abs(p.vy) / 260, 0, 1.6);  // 떨어질수록 길게 늘어짐
      ctx.ellipse(p.x, p.y, p.r * 0.7, p.r * st, 0, 0, TAU);
    } else ctx.arc(p.x, p.y, p.r, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawPops(){
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const p of pops){
    const a = clamp(p.life / 0.4, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = '900 ' + p.size + "px 'Segoe UI', system-ui, sans-serif";
    ctx.strokeStyle = 'rgba(20,10,40,0.8)'; ctx.lineWidth = 4;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}
function render(){
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawBG();
  if (fever > 0){   // 피버타임 황금빛
    const a = 0.05 + 0.03 * Math.sin(performance.now() / 90);
    ctx.fillStyle = 'rgba(255,190,60,' + Math.max(a, fever < 1 ? a * fever : a) + ')';
    ctx.fillRect(0, 0, W, H);
  }
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
  drawStrands();
  for (const p of pieces) drawPiece(p);
  for (const o of objs) drawObj(o);
  drawParticles();
  drawTrail();
  drawPops();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (whiteFlash > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + whiteFlash * 0.4 + ')';
    ctx.fillRect(0, 0, W, H);
  }
  if (redFlash > 0){
    const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7);
    g.addColorStop(0, 'rgba(255,40,40,0)');
    g.addColorStop(1, 'rgba(255,40,40,' + redFlash * 0.5 + ')');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
}

function syncHUD(){

/* ================= 루프 ================= */
let lastT = performance.now();
let fpsAcc = 0, fpsN = 0;
function loop(t){
  requestAnimationFrame(loop);
  const raw = (t - lastT) / 1000;
  const dt = clamp(raw, 0, 0.045);
  lastT = t;
  fpsAcc += raw; fpsN++;
  if (fpsAcc >= 0.5){ fpsEl.textContent = Math.round(fpsN / fpsAcc) + ' fps'; fpsAcc = 0; fpsN = 0; }
  if (state === ST.PLAY && !paused) update(dt);
  else if (state === ST.TUT && !paused) updateTut(dt);
  updateFx(dt);
  render();
  syncHUD();
}
requestAnimationFrame(loop);

function renderCharTo(canvas, ch, locked){
  const n = canvas.width;
  const c2 = canvas.getContext('2d');
  c2.clearRect(0, 0, n, n);
  const r = n * 0.3;
  const spr = makeSprite(ch.type, r, ch.pal, 1.7, false, ch.deco);   // 고정 seed → 항상 같은 모습
  c2.drawImage(spr.c, n / 2 - spr.half, n / 2 - spr.half, spr.half * 2, spr.half * 2);
  if (locked){
    c2.globalCompositeOperation = 'source-atop';
    c2.fillStyle = 'rgba(22,17,45,0.88)';
    c2.fillRect(0, 0, n, n);
    c2.globalCompositeOperation = 'source-over';
    c2.fillStyle = '#8d87a8'; c2.font = '700 ' + n * 0.3 + 'px sans-serif';
    c2.textAlign = 'center'; c2.textBaseline = 'middle';
    c2.fillText('?', n / 2, n / 2);
  }
}

function checkDaily(){
  const today = new Date().toISOString().slice(0, 10);
  if (gd.daily === today) return;
  const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  gd.streak = gd.daily === yest ? Math.min((gd.streak || 0) + 1, 7) : 1;
  gd.daily = today;
  const rw = 30 + gd.streak * 20;
  gd.coins += rw; saveGd(); refreshCoins();
  const bar = $('dailyBar');
  bar.textContent = '📅 출석 보상 +' + rw + '🪙 (' + gd.streak + '일 연속!)';
  bar.classList.remove('hidden');
}
checkDaily();

/* PWA 서비스워커 */
if ('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js').catch(() => {});

syncHUD();
lives = 3; shownLives = -1; syncHUD();
</script>
